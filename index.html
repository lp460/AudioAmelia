<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amelia - La Dictée Intelligente pour macOS</title>
    <style>
        :root {
            --primary: #007AFF;
            --secondary: #5856D6;
            --bg: #0A0A0B;
            --text: #F5F5F7;
            --text-muted: #86868B;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(88, 86, 214, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 10% 20%, rgba(0, 122, 255, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin: 0;
            background: linear-gradient(135deg, #FFF 0%, #AAA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin: 1.5rem 0 3rem;
            line-height: 1.4;
        }

        .cta {
            display: inline-block;
            background: var(--text);
            color: var(--bg);
            padding: 1.2rem 2.8rem;
            border-radius: 99px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }

        .cta:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.2);
        }

        .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            border: 1px rgba(255, 255, 255, 0.1) solid;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--primary);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    
    <div class="container">
        <div class="badge">Disponible pour Apple Silicon</div>
        <h1>Amelia</h1>
        <p class="subtitle">La dictée intelligente et locale pour macOS. <br>Basé sur WhisperKit pour une précision inégalée, sans compromis sur votre vie privée.</p>
        
        <a href="https://github.com/lp460/AudioAmelia/releases/latest" class="cta">Télécharger la dernière version</a>
    </div>

    <div class="footer">
        © 2026 Lorry Poulier · <a href="https://github.com/lp460/AudioAmelia">Dépôt GitHub</a>
    </div>
</body>
</html>
